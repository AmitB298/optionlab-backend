<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog – OptionLab | Options Trading Strategies & Insights</title>
  <meta name="description" content="Expert options trading strategies, market analysis, and educational content from the OptionLab team."/>
  <link rel="canonical" href="https://optionlab.io/blog"/>
  <meta property="og:title" content="OptionLab Blog – Options Trading Insights"/>
  <meta property="og:description" content="Expert options trading strategies, market analysis, and educational content."/>
  <meta property="og:type" content="website"/>
  <link rel="alternate" type="application/rss+xml" title="OptionLab Blog RSS" href="/rss.xml"/>
  <link rel="stylesheet" href="/mobile-fixes.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fb;color:#1a1a2e;line-height:1.6}
    a{color:inherit;text-decoration:none}
    /* Nav */
    nav{background:#fff;border-bottom:1px solid #e8eaf0;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05)}
    .nav-logo{font-weight:700;font-size:18px;color:#2563eb}
    .nav-links{display:flex;gap:24px;font-size:14px}
    .nav-links a{color:#555;transition:color .2s}.nav-links a:hover{color:#2563eb}
    /* Hero */
    .hero{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);color:#fff;text-align:center;padding:64px 24px 48px}
    .hero h1{font-size:clamp(28px,5vw,48px);font-weight:700;margin-bottom:12px}
    .hero p{font-size:18px;opacity:.85;max-width:560px;margin:0 auto 24px}
    .search-box{display:flex;max-width:480px;margin:0 auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.15)}
    .search-box input{flex:1;border:none;padding:14px 16px;font-size:15px;outline:none;color:#333}
    .search-box button{background:#2563eb;color:#fff;border:none;padding:0 20px;cursor:pointer;font-size:15px;transition:background .2s}.search-box button:hover{background:#1d4ed8}
    /* Filters */
    .filters{max-width:1100px;margin:32px auto 0;padding:0 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .filters span{font-size:13px;color:#888;margin-right:4px}
    .tag-btn{background:#fff;border:1px solid #e0e3ea;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all .2s;color:#555}
    .tag-btn:hover,.tag-btn.active{background:#2563eb;border-color:#2563eb;color:#fff}
    /* Grid */
    .container{max-width:1100px;margin:0 auto;padding:32px 24px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:28px}
    /* Card */
    .card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
    .card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
    .card-img{width:100%;height:190px;object-fit:cover;background:#e8eaf0}
    .card-img-placeholder{height:190px;background:linear-gradient(135deg,#e8f0fe,#dbeafe);display:flex;align-items:center;justify-content:center;font-size:40px}
    .card-body{padding:20px;flex:1;display:flex;flex-direction:column}
    .card-meta{display:flex;gap:12px;font-size:12px;color:#888;margin-bottom:10px;align-items:center}
    .card-category{background:#eff6ff;color:#2563eb;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500}
    .card h2{font-size:17px;font-weight:600;line-height:1.4;margin-bottom:8px;color:#1a1a2e}
    .card h2 a:hover{color:#2563eb}
    .card p{font-size:14px;color:#666;flex:1;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .read-more{color:#2563eb;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:4px}.read-more::after{content:'→';transition:transform .2s}.read-more:hover::after{transform:translateX(3px)}
    /* Pagination */
    .pagination{display:flex;gap:8px;justify-content:center;margin-top:40px;flex-wrap:wrap}
    .page-btn{padding:8px 16px;border:1px solid #e0e3ea;border-radius:6px;background:#fff;cursor:pointer;font-size:14px;transition:all .2s;color:#555}
    .page-btn:hover,.page-btn.active{background:#2563eb;border-color:#2563eb;color:#fff}
    .page-btn:disabled{opacity:.4;cursor:not-allowed}
    /* Empty */
    .empty{text-align:center;padding:80px 24px;color:#888}
    .empty h3{font-size:20px;margin-bottom:8px;color:#555}
    /* Loading */
    .loading{text-align:center;padding:60px;color:#888}
    .spinner{width:36px;height:36px;border:3px solid #e0e3ea;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Responsive */
    @media(max-width:600px){.nav-links{display:none}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">OptionLab</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/blog" style="color:#2563eb;font-weight:600">Blog</a>
    <a href="/register">Sign Up</a>
  </div>
</nav>

<div class="hero">
  <h1>OptionLab Blog</h1>
  <p>Options trading strategies, market insights, and education</p>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search posts…" autocomplete="off"/>
    <button onclick="doSearch()">Search</button>
  </div>
</div>

<div class="filters" id="filters">
  <span>Filter:</span>
  <button class="tag-btn active" onclick="filterCategory(null, this)">All</button>
</div>

<div class="container">
  <div id="postsGrid" class="grid">
    <div class="loading"><div class="spinner"></div>Loading posts…</div>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
  const API = window.location.origin;
  let currentPage = 1;
  let currentCategory = null;
  let currentSearch = '';

  async function loadPosts(page = 1) {
    currentPage = page;
    const grid = document.getElementById('postsGrid');
    grid.innerHTML = '<div class="loading"><div class="spinner"></div>Loading…</div>';

    let url = `${API}/api/blog/posts?page=${page}&limit=9`;
    if (currentCategory) url += `&category=${currentCategory}`;
    if (currentSearch)   url += `&search=${encodeURIComponent(currentSearch)}`;

    try {
      const res  = await fetch(url);
      const data = await res.json();
      renderPosts(data.posts || []);
      renderPagination(data.pagination || {});
    } catch (e) {
      grid.innerHTML = '<div class="empty"><h3>Could not load posts</h3><p>Please try again shortly.</p></div>';
    }
  }

  function renderPosts(posts) {
    const grid = document.getElementById('postsGrid');
    if (!posts.length) {
      grid.innerHTML = '<div class="empty"><h3>No posts yet</h3><p>Check back soon for options trading content!</p></div>';
      return;
    }
    grid.innerHTML = posts.map(p => `
      <article class="card">
        ${p.featured_image
          ? `<img class="card-img" src="${p.featured_image}" alt="${p.featured_image_alt || p.title}" loading="lazy"/>`
          : `<div class="card-img-placeholder">📈</div>`}
        <div class="card-body">
          <div class="card-meta">
            ${p.category_name ? `<span class="card-category">${p.category_name}</span>` : ''}
            <span>${formatDate(p.published_at)}</span>
            <span>${p.reading_time_min || 1} min read</span>
          </div>
          <h2><a href="/blog/${p.slug}">${p.title}</a></h2>
          <p>${p.excerpt || ''}</p>
          <a class="read-more" href="/blog/${p.slug}">Read article</a>
        </div>
      </article>
    `).join('');
  }

  function renderPagination(pag) {
    const el = document.getElementById('pagination');
    if (!pag.pages || pag.pages <= 1) { el.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="loadPosts(${pag.page - 1})" ${pag.page <= 1 ? 'disabled' : ''}>← Prev</button>`;
    for (let i = 1; i <= pag.pages; i++) {
      html += `<button class="page-btn ${i === pag.page ? 'active' : ''}" onclick="loadPosts(${i})">${i}</button>`;
    }
    html += `<button class="page-btn" onclick="loadPosts(${pag.page + 1})" ${pag.page >= pag.pages ? 'disabled' : ''}>Next →</button>`;
    el.innerHTML = html;
  }

  async function loadCategories() {
    try {
      const res  = await fetch(`${API}/api/blog/categories`);
      const cats = await res.json();
      const el   = document.getElementById('filters');
      cats.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'tag-btn';
        btn.textContent = `${c.name} (${c.post_count || 0})`;
        btn.onclick = () => filterCategory(c.slug, btn);
        el.appendChild(btn);
      });
    } catch {}
  }

  function filterCategory(slug, btn) {
    currentCategory = slug;
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadPosts(1);
  }

  function doSearch() {
    currentSearch = document.getElementById('searchInput').value.trim();
    loadPosts(1);
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  function formatDate(d) {
    if (!d) return '';
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // Init
  loadCategories();
  loadPosts(1);
</script>
</body>
</html>
