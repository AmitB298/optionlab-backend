<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OptionsLab Admin v2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"><\/script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#030712;--bg2:#060d1a;--bg3:#0d1828;--card:#0f1e35;--bo:rgba(99,155,255,.1);--boh:rgba(99,155,255,.22);--acc:#f97316;--acc2:#ea580c;--grn:#10b981;--red:#ef4444;--yel:#f59e0b;--cyn:#22d3ee;--pur:#a855f7;--tx:#e2eeff;--tx2:#7da8d4;--tx3:#3a5678;--fm:'JetBrains Mono',monospace;--fd:'Bebas Neue',cursive;--fr:'Rajdhani',sans-serif;}
html{font-size:15px}body{background:var(--bg);color:var(--tx);font-family:'Hind',sans-serif;min-height:100vh;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select,textarea{font-family:var(--fm);font-size:.8rem;background:var(--bg3);border:1px solid var(--bo);color:var(--tx);border-radius:6px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:rgba(249,115,22,.35);border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#loginScreen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center}
.lCard{background:var(--card);border:1px solid var(--boh);border-radius:16px;padding:2.2rem;width:340px;animation:fadeUp .3s ease}
.lLogo{font-family:var(--fd);font-size:2rem;letter-spacing:.05em}.lLogo span{color:var(--acc)}
.lSub{font-family:var(--fm);font-size:.5rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:1.8rem;margin-top:.1rem}
.lLabel{display:block;font-family:var(--fm);font-size:.48rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:.28rem}
.lInput{width:100%;padding:.5rem .7rem;border-radius:6px;margin-bottom:.85rem}
.lBtn{width:100%;padding:.65rem;border-radius:8px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-family:var(--fr);font-size:1rem;font-weight:700;letter-spacing:.05em;transition:all .2s;box-shadow:0 4px 16px rgba(249,115,22,.3)}
.lBtn:hover{transform:translateY(-1px)}.lBtn:disabled{opacity:.5;cursor:not-allowed}
.lErr{font-family:var(--fm);font-size:.52rem;color:var(--red);margin-top:.5rem;min-height:.8rem;text-align:center}
#app{display:none;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1.2rem;background:rgba(3,7,18,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--bo)}
.tLogo{font-family:var(--fd);font-size:1.15rem;letter-spacing:.05em;display:flex;align-items:center;gap:.45rem}
.tIcon{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:900;color:#fff}
.tLogo em{color:var(--acc);font-style:normal}.tRight{display:flex;align-items:center;gap:.7rem}
.aChip{font-family:var(--fm);font-size:.48rem;color:var(--tx2);background:var(--bg3);border:1px solid var(--bo);padding:.18rem .6rem;border-radius:20px}
.outBtn{font-family:var(--fm);font-size:.5rem;padding:.2rem .6rem;border-radius:5px;border:1px solid rgba(239,68,68,.25);color:var(--red);background:rgba(239,68,68,.06);transition:.15s}
.outBtn:hover{background:rgba(239,68,68,.14)}
.layout{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:205px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bo);padding:.5rem 0;overflow-y:auto}
.sLabel{font-family:var(--fm);font-size:.42rem;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);padding:.55rem 1rem .15rem;margin-top:.3rem}
.sBtn{display:flex;align-items:center;gap:.4rem;width:100%;padding:.42rem .9rem;font-family:var(--fm);font-size:.52rem;text-transform:uppercase;letter-spacing:.04em;color:var(--tx2);text-align:left;border-left:2px solid transparent;transition:all .15s}
.sBtn:hover{background:rgba(249,115,22,.06);color:var(--tx)}.sBtn.active{border-left-color:var(--acc);color:var(--acc);background:rgba(249,115,22,.07)}
.sBadge{margin-left:auto;font-family:var(--fm);font-size:.4rem;background:rgba(16,185,129,.15);color:var(--grn);padding:.06rem .35rem;border-radius:10px}
.main{flex:1;padding:1.2rem;overflow-y:auto;min-width:0}
.page{display:none;animation:fadeUp .2s ease}.page.active{display:block}
.pHead{margin-bottom:1.1rem}.pTitle{font-family:var(--fd);font-size:1.55rem;letter-spacing:.04em}
.pSub{font-family:var(--fm);font-size:.5rem;color:var(--tx3);margin-top:.1rem}
.sGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.6rem;margin-bottom:1rem}
.sCard{background:var(--card);border:1px solid var(--bo);border-radius:9px;padding:.75rem;transition:border-color .2s;position:relative;overflow:hidden}
.sCard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sCard.cGrn::after{background:linear-gradient(90deg,var(--grn),transparent)}.sCard.cOrg::after{background:linear-gradient(90deg,var(--acc),transparent)}
.sCard.cCyn::after{background:linear-gradient(90deg,var(--cyn),transparent)}.sCard.cRed::after{background:linear-gradient(90deg,var(--red),transparent)}
.sCard.cPur::after{background:linear-gradient(90deg,var(--pur),transparent)}.sCard.cYel::after{background:linear-gradient(90deg,var(--yel),transparent)}
.sCard:hover{border-color:var(--boh)}.sLbl{font-family:var(--fm);font-size:.42rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:.2rem}
.sVal{font-family:var(--fd);font-size:1.9rem;line-height:1}.sSub{font-family:var(--fm);font-size:.42rem;color:var(--tx3);margin-top:.18rem}
.sTrend{font-family:var(--fm);font-size:.44rem;font-weight:700;margin-top:.15rem}.tUp{color:var(--grn)}.tDn{color:var(--red)}
.cG{color:var(--grn)}.cR{color:var(--red)}.cO{color:var(--acc)}.cC{color:var(--cyn)}.cW{color:var(--tx)}.cY{color:var(--yel)}.cP{color:var(--pur)}
.card{background:var(--card);border:1px solid var(--bo);border-radius:9px;padding:.9rem;margin-bottom:.85rem}
.cHead{font-family:var(--fm);font-size:.48rem;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2);margin-bottom:.7rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.cHead2{font-family:var(--fr);font-size:.9rem;font-weight:700;margin-bottom:.6rem;display:flex;align-items:center;justify-content:space-between}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem}
.chartWrap{position:relative;width:100%;height:200px}.chartWrapLg{height:260px}
.tWrap{overflow-x:auto;border-radius:8px;border:1px solid var(--bo);margin-bottom:.75rem}
table{width:100%;border-collapse:collapse;font-family:var(--fm);font-size:.54rem;white-space:nowrap}
thead th{background:var(--bg3);border-bottom:1px solid var(--bo);padding:.4rem .6rem;text-align:left;font-size:.43rem;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2)}
tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s}tbody tr:hover{background:rgba(255,255,255,.022)}
td{padding:.38rem .6rem;vertical-align:middle}.tName{color:var(--tx);font-weight:600}.tMute{color:var(--tx3)}
.tLoad td{text-align:center;padding:1.2rem;color:var(--tx3)}
.badge{display:inline-flex;align-items:center;padding:.1rem .4rem;border-radius:20px;font-family:var(--fm);font-size:.42rem;font-weight:700}
.bG{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:var(--grn)}
.bR{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.bO{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);color:var(--acc)}
.bY{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);color:var(--yel)}
.bC{background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.25);color:var(--cyn)}
.bP{background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.25);color:var(--pur)}
.bX{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--tx3)}
.btn{display:inline-flex;align-items:center;gap:.25rem;padding:.28rem .65rem;border-radius:5px;font-family:var(--fr);font-size:.72rem;font-weight:700;letter-spacing:.04em;transition:all .15s;cursor:pointer}
.btnP{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}.btnP:hover{box-shadow:0 3px 12px rgba(249,115,22,.4)}
.btnG{background:var(--bg3);border:1px solid var(--bo);color:var(--tx2)}.btnG:hover{border-color:var(--acc);color:var(--acc)}
.btnD{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);color:var(--red)}.btnD:hover{background:rgba(239,68,68,.16)}
.btnS{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.22);color:var(--grn)}
.btnSm{padding:.18rem .44rem;font-size:.62rem}.btn:disabled{opacity:.4;cursor:not-allowed}
.fBar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.85rem}
.fSrc{padding:.34rem .65rem;font-size:.6rem;border-radius:6px;flex:1;min-width:160px}
.fSel{padding:.34rem .55rem;font-size:.56rem;border-radius:6px}
.pag{display:flex;align-items:center;gap:.5rem;margin-top:.6rem;font-family:var(--fm);font-size:.5rem;color:var(--tx3)}
.pBtn{padding:.22rem .55rem;border-radius:5px;background:var(--bg3);border:1px solid var(--bo);color:var(--tx2);cursor:pointer;transition:.15s}
.pBtn:hover:not(:disabled){border-color:var(--acc);color:var(--acc)}.pBtn:disabled{opacity:.4;cursor:not-allowed}.pInfo{flex:1;text-align:center}
.bulkBar{display:none;align-items:center;gap:.4rem;flex-wrap:wrap;background:var(--bg3);border:1px solid var(--boh);border-radius:7px;padding:.42rem .7rem;margin-bottom:.6rem}
.dOvl{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(3px)}
.dOvl.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:-100%;width:min(560px,96vw);height:100vh;z-index:201;background:var(--bg2);border-left:1px solid var(--bo);display:flex;flex-direction:column;transition:right .28s cubic-bezier(.4,0,.2,1)}
.drawer.open{right:0}
.dHead{padding:.9rem 1rem;border-bottom:1px solid var(--bo);display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.dAva{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--acc),var(--cyn));display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:.95rem;color:#fff}
.dName{font-family:var(--fr);font-size:.95rem;font-weight:700}.dSub2{font-family:var(--fm);font-size:.46rem;color:var(--tx3);margin-top:.08rem}
.dClose{margin-left:auto;color:var(--tx3);cursor:pointer;font-size:1.1rem;padding:.25rem}.dClose:hover{color:var(--tx)}
.dTabs{display:flex;border-bottom:1px solid var(--bo);flex-shrink:0}
.dTab{flex:1;padding:.48rem;font-family:var(--fm);font-size:.46rem;text-align:center;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.dTab.active{color:var(--acc);border-bottom-color:var(--acc)}.dPanel{display:none;padding:.85rem;overflow-y:auto;flex:1}.dPanel.active{display:block}
.dRow{display:flex;justify-content:space-between;align-items:center;padding:.3rem 0;border-bottom:1px solid rgba(255,255,255,.04)}.dRow:last-child{border:none}
.dKey{font-family:var(--fm);font-size:.48rem;color:var(--tx3)}.dVal{font-family:var(--fm);font-size:.51rem;color:var(--tx)}
.dSec{font-family:var(--fm);font-size:.41rem;text-transform:uppercase;letter-spacing:.1em;color:var(--acc);margin:.65rem 0 .28rem}
.actGrid{display:grid;grid-template-columns:1fr 1fr;gap:.38rem;margin-top:.65rem}
.mOvl{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(5px)}
.mOvl.open{display:flex}
.modal{background:var(--card);border:1px solid var(--boh);border-radius:12px;padding:1.4rem;width:min(440px,100%);animation:fadeUp .2s ease;max-height:90vh;overflow-y:auto}
.mTitle{font-family:var(--fd);font-size:1.2rem;margin-bottom:.9rem}
.mLbl{display:block;font-family:var(--fm);font-size:.45rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:.28rem}
.mIn{width:100%;padding:.45rem .65rem;border-radius:6px;margin-bottom:.65rem}
.mTa{width:100%;padding:.45rem .65rem;border-radius:6px;resize:vertical;min-height:68px;margin-bottom:.65rem}
.mActs{display:flex;gap:.5rem;justify-content:flex-end;margin-top:.3rem}
#toasts{position:fixed;bottom:1rem;right:1rem;z-index:999;display:flex;flex-direction:column;gap:.35rem}
.toast{padding:.42rem .8rem;border-radius:7px;font-family:var(--fm);font-size:.52rem;font-weight:700;display:flex;align-items:center;gap:.35rem;animation:fadeUp .2s ease;pointer-events:none;max-width:290px}
.tOk{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--grn)}
.tErr{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.tInf{background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.3);color:var(--cyn)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--bo);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.dotOn{background:var(--grn);box-shadow:0 0 6px var(--grn);animation:pulse 2s infinite}.dotOff{background:var(--tx3)}
.row{display:flex;align-items:center;gap:.6rem;padding:.42rem .65rem;background:var(--bg3);border:1px solid var(--bo);border-radius:7px;margin-bottom:.35rem}
.healthBar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin:.3rem 0;width:80px}
.healthFill{height:100%;border-radius:3px;transition:width .5s}.hGrn{background:var(--grn)}.hYel{background:var(--yel)}.hRed{background:var(--red)}
.refBox{background:var(--bg3);border:1px solid var(--bo);border-radius:8px;padding:.7rem .9rem;margin-bottom:.4rem;transition:border-color .15s;cursor:pointer}
.refBox:hover{border-color:var(--acc)}
.tpPill{padding:.18rem .6rem;border-radius:20px;font-family:var(--fm);font-size:.46rem;font-weight:700;cursor:pointer;border:1px solid var(--bo);color:var(--tx2);transition:.15s;display:inline-block;margin:.1rem}
.tpActive{border-color:var(--acc)!important;color:var(--acc)!important;background:rgba(249,115,22,.08)!important}

/* ═══════════════════════════════════════════════
   MOBILE RESPONSIVE — admin.html
   Complete mobile layout from scratch
═══════════════════════════════════════════════ */

@media(max-width:900px){
  html{font-size:14px}

  /* Login screen */
  .lCard{padding:1.5rem 1.2rem !important;max-width:95vw !important;width:95vw !important}
  .lLogo{font-size:1.4rem !important}

  /* App shell */
  #app{display:flex;flex-direction:column}

  /* Topbar */
  .topbar{padding:0 .8rem !important;height:48px !important}
  .tLogo{font-size:.8rem !important;gap:.4rem !important}
  .tIcon{width:28px !important;height:28px !important;font-size:.6rem !important}
  .tRight{gap:.4rem !important}
  .aChip{font-size:.55rem !important;padding:.15rem .4rem !important}

  /* Sidebar: collapse to horizontal tab bar on mobile */
  .sidebar{
    position:static !important;
    width:100% !important;
    height:auto !important;
    flex-direction:row !important;
    overflow-x:auto !important;
    overflow-y:hidden !important;
    border-right:none !important;
    border-bottom:1px solid var(--bo) !important;
    padding:.25rem .4rem !important;
    gap:.1rem !important;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    flex-shrink:0;
  }
  .sidebar::-webkit-scrollbar{display:none}
  .sNav{flex-direction:row !important;gap:0 !important;padding:0 !important}
  .sGrp{flex-direction:row !important;border-bottom:none !important;padding:0 !important;gap:.1rem !important}
  .sGrpLabel{display:none !important}
  .sBtn{
    flex-direction:row !important;
    gap:.3rem !important;
    padding:.35rem .6rem !important;
    border-left:none !important;
    border-bottom:2px solid transparent !important;
    white-space:nowrap !important;
    font-size:.6rem !important;
    min-width:auto !important;
    border-radius:6px !important;
  }
  .sBtn.active{border-bottom-color:var(--acc) !important;background:rgba(249,115,22,.1) !important}
  .sBtnLabel{display:block !important;font-size:.58rem !important}
  .sBtnIcon{font-size:.8rem !important}

  /* Main content area */
  .content{
    padding:.75rem !important;
    overflow-x:hidden !important;
  }

  /* Section headers */
  .sec-hdr{flex-wrap:wrap !important;gap:.5rem !important;margin-bottom:.75rem !important}
  .sec-title{font-size:.75rem !important}
  .sec-sub{font-size:.58rem !important}

  /* Stats grid: 2 cols on tablet, stack on phone */
  .ov-grid{grid-template-columns:1fr 1fr !important;gap:.5rem !important}
  .ov-card{padding:.75rem !important}
  .ov-val{font-size:1.3rem !important}
  .ov-label{font-size:.55rem !important}
  .ov-trend{font-size:.5rem !important}

  /* Charts: full width */
  .chart-row{grid-template-columns:1fr !important;gap:.75rem !important}
  .chart-card{padding:.75rem !important}
  .chart-title{font-size:.65rem !important}

  /* Tables: horizontal scroll */
  .table-wrap,.tWrap{
    overflow-x:auto !important;
    -webkit-overflow-scrolling:touch !important;
    margin:0 -.75rem !important;
    padding:0 .75rem !important;
  }
  table,#uTable{min-width:700px !important}
  th,td{padding:.4rem .6rem !important;font-size:.58rem !important;white-space:nowrap !important}
  thead th{font-size:.55rem !important}

  /* Filters bar */
  .filters,.filter-row{flex-wrap:wrap !important;gap:.4rem !important}
  .filter-row select,.filter-row input{font-size:.6rem !important;padding:.3rem .5rem !important}
  .btn-sm{font-size:.58rem !important;padding:.3rem .5rem !important}

  /* User detail modal */
  .modal{width:95vw !important;max-width:95vw !important;padding:1rem !important;max-height:90vh !important;overflow-y:auto !important}
  .modal-title{font-size:.8rem !important}
  .modal-tabs{flex-wrap:wrap !important;gap:.25rem !important}
  .modal-tab{font-size:.58rem !important;padding:.3rem .5rem !important}

  /* Announcement cards */
  .ann-item{padding:.6rem !important}
  .ann-title{font-size:.65rem !important}
  .ann-body{font-size:.6rem !important}

  /* Health cards */
  .health-grid{grid-template-columns:1fr 1fr !important;gap:.5rem !important}
  .health-card{padding:.6rem !important}

  /* Forms */
  .form-group{margin-bottom:.75rem !important}
  .form-label{font-size:.62rem !important}
  input,select,textarea{font-size:.65rem !important;padding:.4rem .6rem !important}
  .btn{font-size:.65rem !important;padding:.4rem .8rem !important}
  .btn-primary,.btn-danger,.btn-success{font-size:.62rem !important}
}

@media(max-width:600px){
  html{font-size:13px}
  .ov-grid{grid-template-columns:1fr 1fr !important}
  .chart-row{grid-template-columns:1fr !important}
  .health-grid{grid-template-columns:1fr !important}
  .topbar{padding:0 .6rem !important}
  .tLogo em,.tLogoSub{display:none}
  .content{padding:.5rem !important}
  .sec-title{font-size:.7rem !important}
}

@media(max-width:400px){
  .ov-grid{grid-template-columns:1fr 1fr !important}
  .sBtn{padding:.3rem .45rem !important;font-size:.55rem !important}
}

/* iOS input zoom prevention */
@supports (-webkit-touch-callout: none){
  input,select,textarea{font-size:16px !important}
}
@media screen and (-webkit-min-device-pixel-ratio:0){
  select,textarea,input{font-size:max(16px,1em)}
}
</style>
</head>
<body style="background:#030712;color:#e2eeff">

<div id="loginScreen" style="position:fixed;inset:0;background:#030712;display:flex;align-items:center;justify-content:center;z-index:999">
  <div class="lCard">
    <div class="lLogo">Options<span>Lab</span></div>
    <div class="lSub">Admin Panel v2 · Restricted Access</div>
    <label class="lLabel">Mobile</label>
    <input id="lMob" class="lInput" type="tel" placeholder="10-digit mobile" maxlength="10">

<script>
'use strict';
let tok=sessionStorage.getItem('ol_admin_token')||'';
let adm=sessionStorage.getItem('ol_admin_name')||'Admin';
let uPage=1,audPage=1,curId=null,curNotes='',selIds=new Set(),annType='info',dbt=null;
let charts={};

const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fdt=iso=>iso?new Date(iso).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'--';
const fds=iso=>iso?new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'}):'--';
const fmoney=n=>n?'\u20b9'+Number(n).toLocaleString('en-IN'):'\u20b90';
const pb=p=>{const m={FREE:'bC',PAID:'bO',TRIAL:'bY',SUSPENDED:'bR'};return'<span class="badge '+( m[p]||'bX')+'">'+esc(p||'--')+'</span>';};
const sb=a=>a?'<span class="badge bG">Active</span>':'<span class="badge bR">Inactive</span>';
function toast(m,t){const e=document.createElement('div');e.className='toast '+(t==='ok'?'tOk':t==='err'?'tErr':'tInf');e.textContent=m;document.getElementById('toasts').appendChild(e);setTimeout(()=>e.remove(),3500);}
async function req(path,opts){
  opts=opts||{};
  const r=await fetch(path,Object.assign({},opts,{headers:Object.assign({'Content-Type':'application/json','Authorization':'Bearer '+tok},opts.headers||{})}));
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(d.error||d.message||'HTTP '+r.status);
  return d;
}
const closeMod=id=>document.getElementById(id).classList.remove('open');

Chart.defaults.color='rgba(125,168,212,.7)';
Chart.defaults.borderColor='rgba(99,155,255,.08)';
Chart.defaults.font.family='JetBrains Mono, monospace';
Chart.defaults.font.size=10;

function mkChart(id,type,labels,datasets,opts){
  const el=document.getElementById(id);if(!el)return;
  if(charts[id])charts[id].destroy();
  charts[id]=new Chart(el,{type:type,data:{labels:labels,datasets:datasets},options:Object.assign({responsive:true,maintainAspectRatio:false,plugins:{legend:{display:datasets.length>1,labels:{boxWidth:10,padding:10}},tooltip:{mode:'index',intersect:false}},scales:{x:{grid:{color:'rgba(99,155,255,.05)'},ticks:{maxRotation:45}},y:{grid:{color:'rgba(99,155,255,.05)'}}}},opts||{})});
}
function mkDoughnut(id,labels,data,colors){
  const el=document.getElementById(id);if(!el)return;
  if(charts[id])charts[id].destroy();
  charts[id]=new Chart(el,{type:'doughnut',data:{labels:labels,datasets:[{data:data,backgroundColor:colors,borderWidth:1,borderColor:'rgba(99,155,255,.1)'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{boxWidth:10,padding:8}}}}});
}

async function doLogin(){
  const mob=document.getElementById('lMob').value.trim();
  const pin=document.getElementById('lPin').value.trim();
  const btn=document.getElementById('lBtn'),err=document.getElementById('lErr');
  err.textContent='';
  if(!mob||!pin){err.textContent='Mobile and MPIN required';return;}
  btn.disabled=true;btn.textContent='Signing in...';
  try{
    const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mobile:mob,mpin:pin})});
    const d=await r.json();
    if(!d.success)throw new Error(d.message||'Invalid credentials');
    tok=d.token;adm=d.admin&&d.admin.name||'Admin';
    sessionStorage.setItem('ol_admin_token',tok);sessionStorage.setItem('ol_admin_name',adm);
    document.getElementById('aChip').textContent=adm;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  }catch(e){err.textContent=e.message;}
  finally{btn.disabled=false;btn.textContent='Sign In to Admin Panel';}
}
function doLogout(){fetch('/api/admin/logout',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok}}).catch(function(){});sessionStorage.clear();location.reload();}

function nav(name,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.sBtn').forEach(function(b){b.classList.remove('active');});
  var pg=document.getElementById('page-'+name);if(pg)pg.classList.add('active');
  if(btn)btn.classList.add('active');
  var map={overview:loadOverview,analytics:loadAnalytics,retention:loadRetention,activity:loadActivity,users:function(){loadUsers(1);},subscriptions:loadSubs,referrals:loadReferrals,announce:loadAnns,health:loadHealth,audit:function(){loadAudit(1);}};
  if(map[name])map[name]();
}

async function initApp(){
  document.getElementById('aChip').textContent=adm;
  loadOverview();
  try{const h=await req('/api/admin/health');const dot=document.getElementById('dbDot');dot.className='dot '+(h.status==='healthy'?'dotOn':'dotOff');dot.title='DB '+(h.checks&&h.checks.database&&h.checks.database.latency_ms||'?')+'ms';}catch(e){}
  setInterval(async function(){try{const d=await req('/api/admin/analytics/activity');document.getElementById('onlineBadge').textContent=d.onlineCount||0;}catch(e){}},60000);
}

async function loadOverview(){
  try{
    const results=await Promise.all([req('/api/admin/stats'),req('/api/admin/analytics/signups'),req('/api/admin/analytics/revenue'),req('/api/admin/analytics/activity')]);
    const stats=results[0],sig=results[1],rev=results[2],act=results[3];
    const g=function(id){return document.getElementById(id);};
    const u=stats.users,d=stats.activity,r=stats.revenue;
    g('ov-total').textContent=u.total;g('ov-active').textContent=u.active;
    g('ov-trend').textContent='\u2191 '+u.new_7d+' this week';
    g('ov-paid').textContent=u.paid;g('ov-mrr').innerHTML='MRR '+fmoney(rev.mrr&&rev.mrr.mrr_inr||0);
    g('ov-free').textContent=u.free;g('ov-dau').textContent=d.dau;g('ov-wau').textContent=d.wau;g('ov-mau').textContent=d.mau;
    g('ov-flagged').textContent=u.flagged;g('ov-devs').textContent=stats.devices.trusted;
    g('ov-upgrades').textContent=r.upgrades_30d;g('ov-new7').textContent=u.new_7d;g('ov-new30').textContent=u.new_30d;
    g('ovTs').textContent='Updated: '+new Date().toLocaleTimeString('en-IN');
    mkChart('ovSig','bar',sig.daily.map(function(x){return x.date&&x.date.slice(5,10)||'';}),
      [{label:'Signups',data:sig.daily.map(function(x){return +x.signups||0;}),backgroundColor:'rgba(249,115,22,.4)',borderColor:'rgba(249,115,22,.8)',borderWidth:1,borderRadius:3}]);
    mkChart('ovRev','line',rev.daily.map(function(x){return x.date&&x.date.slice(5,10)||'';}),
      [{label:'Revenue',data:rev.daily.map(function(x){return +x.revenue||0;}),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.1)',fill:true,tension:.4,pointRadius:2}]);
    g('ovOnline').textContent=(act.onlineCount||0)+' online';g('onlineBadge').textContent=act.onlineCount||0;
    var items=(act.recentUpgrades||[]).map(function(x){return '<div class="row"><span class="dot dotOn"></span><span style="font-family:var(--fm);font-size:.51rem;flex:1">'+esc(x.name)+' upgraded '+pb(x.plan_from)+' to '+pb(x.plan_to)+'</span><span class="tMute" style="font-size:.43rem">'+fdt(x.created_at)+'</span></div>';})
      .concat((act.recentSignups||[]).map(function(x){return '<div class="row"><span class="dot" style="background:var(--cyn)"></span><span style="font-family:var(--fm);font-size:.51rem;flex:1">New: '+esc(x.name)+' ('+esc(x.mobile)+') '+pb(x.plan)+'</span><span class="tMute" style="font-size:.43rem">'+fdt(x.created_at)+'</span></div>';})).slice(0,10);
    g('ovFeed').innerHTML=items.join('')||'<div style="font-family:var(--fm);font-size:.52rem;color:var(--tx3);padding:.5rem">No recent activity</div>';
  }catch(e){toast('Overview: '+e.message,'err');}
}

async function loadAnalytics(){
  try{
    const results=await Promise.all([req('/api/admin/analytics/signups'),req('/api/admin/analytics/revenue')]);
    const sig=results[0],rev=results[1],t=sig.totals,g=function(id){return document.getElementById(id);};
    g('an-24h').textContent=t.last_24h||0;g('an-7d').textContent=t.last_7d||0;g('an-30d').textContent=t.last_30d||0;g('an-all').textContent=t.all_time||0;
    g('an-paid').textContent=rev.mrr&&rev.mrr.paid_users||0;g('an-mrr').textContent=(+( rev.mrr&&rev.mrr.mrr_inr)||0).toLocaleString('en-IN');
    mkChart('sigChart','bar',sig.daily.map(function(x){return x.date&&x.date.slice(5,10)||'';}),
      [{label:'Total',data:sig.daily.map(function(x){return +x.signups||0;}),backgroundColor:'rgba(249,115,22,.5)',borderColor:'rgba(249,115,22,.9)',borderWidth:1,borderRadius:3},
       {label:'Paid',data:sig.daily.map(function(x){return +x.paid_signups||0;}),backgroundColor:'rgba(16,185,129,.5)',borderColor:'rgba(16,185,129,.9)',borderWidth:1,borderRadius:3}]);
    mkChart('revChart','bar',rev.monthly.map(function(x){return x.month&&x.month.slice(0,7)||'';}),
      [{label:'Revenue',data:rev.monthly.map(function(x){return +x.revenue||0;}),backgroundColor:'rgba(16,185,129,.4)',borderColor:'rgba(16,185,129,.8)',borderWidth:1,borderRadius:3,yAxisID:'y'},
       {label:'Upgrades',data:rev.monthly.map(function(x){return +x.upgrades||0;}),type:'line',borderColor:'rgba(249,115,22,.9)',backgroundColor:'transparent',pointRadius:4,tension:.3,yAxisID:'y1'}],
      {scales:{y:{position:'left',ticks:{callback:function(v){return '\u20b9'+v.toLocaleString('en-IN');}}},y1:{position:'right',grid:{drawOnChartArea:false}}}});
    var tb=document.getElementById('revByRef');
    tb.innerHTML=(rev.byReferral||[]).length?(rev.byReferral||[]).map(function(r){var conv=r.total_users>0?Math.round(r.paid_users*100/r.total_users):0;return'<tr><td><span class="badge bO">'+esc(r.referral_code)+'</span></td><td>'+r.total_users+'</td><td>'+r.paid_users+'</td><td style="color:var(--grn)">'+(+r.total_revenue||0).toLocaleString('en-IN')+'</td><td>'+conv+'%</td></tr>';}).join(''):'<tr class="tLoad"><td colspan="5">No referral revenue data</td></tr>';
  }catch(e){toast('Analytics: '+e.message,'err');}
}

async function loadRetention(){
  try{
    const d=await req('/api/admin/analytics/overview');
    mkChart('dauChart','line',d.dau.map(function(r){return r.date&&r.date.slice(5,10)||'';}),
      [{label:'DAU',data:d.dau.map(function(r){return +r.active_users||0;}),borderColor:'rgba(34,211,238,.9)',backgroundColor:'rgba(34,211,238,.08)',fill:true,tension:.4,pointRadius:2}]);
    var C=['#f97316','#10b981','#22d3ee','#a855f7','#f59e0b','#ef4444'];
    mkDoughnut('styleChart',d.tradingStyles.map(function(r){return r.trading_style||'?';}),d.tradingStyles.map(function(r){return +r.users||0;}),C);
    mkDoughnut('expChart',d.experience.map(function(r){return r.experience||'?';}),d.experience.map(function(r){return +r.users||0;}),C);
    document.getElementById('retTable').innerHTML=d.retention.map(function(r){
      var w2=r.cohort_size>0?Math.round(r.retained_w2*100/r.cohort_size):0;
      var w3=r.cohort_size>0?Math.round(r.retained_w3*100/r.cohort_size):0;
      var w4=r.cohort_size>0?Math.round(r.retained_w4*100/r.cohort_size):0;
      function bar(v,t){return'<div class="healthBar"><div class="healthFill '+(v>=t?'hGrn':v>=t/2?'hYel':'hRed')+'" style="width:'+v+'%"></div></div> '+v+'%';}
      return'<tr><td>Wk '+r.cohort_week+'</td><td>'+r.cohort_size+'</td><td>'+bar(w2,60)+'</td><td>'+bar(w3,40)+'</td><td>'+bar(w4,30)+'</td></tr>';
    }).join('')||'<tr class="tLoad"><td colspan="5">No cohort data yet</td></tr>';
  }catch(e){toast('Retention: '+e.message,'err');}
}

async function loadActivity(){
  try{
    const d=await req('/api/admin/analytics/activity');
    document.getElementById('act-on').textContent=d.onlineCount||0;
    document.getElementById('act-sig').textContent=(d.recentSignups||[]).length;
    document.getElementById('act-up').textContent=(d.recentUpgrades||[]).length;
    document.getElementById('actOnBadge').textContent=d.onlineCount||0;
    document.getElementById('onlineBadge').textContent=d.onlineCount||0;
    document.getElementById('actTs').textContent='Updated: '+new Date().toLocaleTimeString('en-IN');
    var hrs=Array.from({length:24},function(_,i){return i;});
    var lMap={};(d.hourlyLogins||[]).forEach(function(r){lMap[r.hour]=+r.logins||0;});
    mkChart('hrChart','bar',hrs.map(function(h){return h+':00';}),
      [{label:'Logins',data:hrs.map(function(h){return lMap[h]||0;}),backgroundColor:'rgba(249,115,22,.4)',borderColor:'rgba(249,115,22,.8)',borderWidth:1,borderRadius:3}]);
    document.getElementById('onlineList').innerHTML=(d.online||[]).length
      ?(d.online||[]).map(function(u){return'<div class="row"><span class="dot dotOn"></span><div style="flex:1;min-width:0"><div style="font-family:var(--fm);font-size:.52rem;color:var(--tx)">'+esc(u.name)+' <span class="tMute">'+esc(u.mobile)+'</span></div><div class="tMute" style="font-size:.43rem">'+esc(u.last_device||'?')+' - '+esc(u.last_login_ip||'?')+'</div></div>'+pb(u.plan)+'</div>';}).join('')
      :'<div style="font-family:var(--fm);font-size:.52rem;color:var(--tx3);padding:.5rem">No users online in last 10 min</div>';
    document.getElementById('sigList').innerHTML=(d.recentSignups||[]).slice(0,8).map(function(u){return'<div class="row"><div style="flex:1;min-width:0"><div style="font-family:var(--fm);font-size:.52rem;color:var(--tx)">'+esc(u.name)+' <span class="tMute">'+esc(u.mobile)+'</span></div><div class="tMute" style="font-size:.42rem">'+(u.referral_code?'Ref:'+u.referral_code+' | ':'')+esc(u.experience||'?')+'</div></div><span class="tMute" style="font-size:.42rem">'+fdt(u.created_at)+'</span></div>';}).join('')||'<div style="font-family:var(--fm);font-size:.52rem;color:var(--tx3);padding:.5rem">None</div>';
    document.getElementById('upList').innerHTML=(d.recentUpgrades||[]).slice(0,8).map(function(u){return'<div class="row"><div style="flex:1;min-width:0"><div style="font-family:var(--fm);font-size:.52rem;color:var(--tx)">'+esc(u.name)+' <span class="tMute">'+esc(u.mobile)+'</span></div><div style="font-size:.42rem">'+pb(u.plan_from)+'to'+pb(u.plan_to)+'</div></div><span style="color:var(--grn);font-family:var(--fm);font-size:.46rem">'+(u.amount?'\u20b9'+u.amount:'--')+'</span></div>';}).join('')||'<div style="font-family:var(--fm);font-size:.52rem;color:var(--tx3);padding:.5rem">None</div>';
  }catch(e){toast('Activity: '+e.message,'err');}
}

function debU(){clearTimeout(dbt);dbt=setTimeout(function(){loadUsers(1);},350);}
async function loadUsers(pg){
  pg=pg||1;uPage=pg;
  var qs=new URLSearchParams({page:pg,limit:50,sort:document.getElementById('uSort').value||'created_at',dir:document.getElementById('uDir').value||'desc'});
  var src=document.getElementById('uSrc').value;if(src)qs.set('search',src);
  var pl=document.getElementById('uPlan').value;if(pl)qs.set('plan',pl);
  var st=document.getElementById('uStat').value;if(st)qs.set('status',st);
  var fl=document.getElementById('uFlag').value;if(fl)qs.set('flagged',fl);
  var tb=document.getElementById('uBody');
  tb.innerHTML='<tr class="tLoad"><td colspan="12"><span class="spin"></span></td></tr>';
  try{
    const d=await req('/api/admin/users?'+qs.toString());
    var tot=d.pagination&&d.pagination.total||0,pgs=d.pagination&&d.pagination.pages||1;
    document.getElementById('uInfo').textContent='Page '+pg+'/'+pgs+' - '+tot+' users';
    document.getElementById('uPrev').disabled=pg<=1;document.getElementById('uNext').disabled=pg>=pgs;
    tb.innerHTML=(d.users||[]).map(function(u){return'<tr><td><input type="checkbox" class="ucb" value="'+u.id+'" onchange="togSel('+u.id+')"></td><td class="tMute">'+u.id+'</td><td class="tName">'+esc(u.name)+'</td><td>'+esc(u.mobile)+'</td><td>'+pb(u.plan)+'</td><td>'+sb(u.is_active)+'</td><td>'+(u.flagged?'<span class="badge bR">Flagged</span>':'--')+'</td><td class="tMute">'+fdt(u.last_login_at)+'</td><td class="tMute">'+(u.total_logins||0)+'</td><td>'+(u.referral_code?'<span class="badge bP">'+esc(u.referral_code)+'</span>':'--')+'</td><td class="tMute">'+fds(u.created_at)+'</td><td><button class="btn btnG btnSm" onclick="openDr('+u.id+')">View</button></td></tr>';}).join('')||'<tr class="tLoad"><td colspan="12">No users found</td></tr>';
  }catch(e){tb.innerHTML='<tr class="tLoad"><td colspan="12">Error: '+esc(e.message)+'</td></tr>';toast(e.message,'err');}
}
function togAll(){var c=document.getElementById('selAll').checked;document.querySelectorAll('.ucb').forEach(function(cb){cb.checked=c;c?selIds.add(+cb.value):selIds.delete(+cb.value);});updBulk();}
function togSel(id){var cb=document.querySelector('.ucb[value="'+id+'"]');cb&&cb.checked?selIds.add(id):selIds.delete(id);updBulk();}
function updBulk(){document.getElementById('bulkBar').style.display=selIds.size?'flex':'none';document.getElementById('bulkCnt').textContent=selIds.size+' selected';}
function clearSel(){selIds.clear();document.querySelectorAll('.ucb').forEach(function(cb){cb.checked=false;});document.getElementById('selAll').checked=false;updBulk();}
function openBulkPlan(){document.getElementById('bpMod').classList.add('open');}
async function bulkDo(action){
  var ids=[...selIds];if(!ids.length){toast('No users selected','err');return;}
  var body={userIds:ids,action:action};
  if(action==='set_plan'){body.payload={plan:document.getElementById('bpSel').value};closeMod('bpMod');}
  try{const d=await req('/api/admin/users/bulk-action',{method:'POST',body:JSON.stringify(body)});toast(d.message||'Done','ok');clearSel();loadUsers(uPage);}catch(e){toast(e.message,'err');}
}

async function loadSubs(){
  var type=document.getElementById('subType').value||'';
  var tb=document.getElementById('subBody');
  tb.innerHTML='<tr class="tLoad"><td colspan="9"><span class="spin"></span></td></tr>';
  try{
    const d=await req('/api/admin/subscriptions'+(type?'?type='+type:''));
    var t=d.totals||{};
    document.getElementById('sub-rev').textContent=(+t.total_revenue||0).toLocaleString('en-IN');
    document.getElementById('sub-up').textContent=t.upgrades||0;document.getElementById('sub-dn').textContent=t.downgrades||0;
    document.getElementById('sub-avg').textContent=(+t.avg_amount||0).toFixed(0);
    tb.innerHTML=(d.subscriptions||[]).map(function(s){return'<tr><td class="tMute">'+fdt(s.created_at)+'</td><td class="tName">'+esc(s.name)+'</td><td>'+esc(s.mobile)+'</td><td>'+pb(s.plan_from)+'</td><td>'+pb(s.plan_to)+'</td><td style="color:var(--grn);font-weight:700">'+(s.amount?'\u20b9'+Number(s.amount).toLocaleString('en-IN'):'--')+'</td><td class="tMute" style="max-width:100px;overflow:hidden;text-overflow:ellipsis">'+esc(s.payment_ref||'--')+'</td><td class="tMute" style="max-width:130px;overflow:hidden;text-overflow:ellipsis">'+esc(s.reason||'--')+'</td><td class="tMute">'+esc(s.changed_by_name||'--')+'</td></tr>';}).join('')||'<tr class="tLoad"><td colspan="9">No records</td></tr>';
  }catch(e){tb.innerHTML='<tr class="tLoad"><td colspan="9">Error: '+esc(e.message)+'</td></tr>';toast(e.message,'err');}

async function submitManualPayment(){
  var uid=document.getElementById('mpUid').value,reason=document.getElementById('mpReason').value;
  if(!uid||!reason){toast('User ID and Reason required','err');return;}
  try{
    const d=await req('/api/admin/subscriptions/manual',{method:'POST',body:JSON.stringify({user_id:+uid,plan:document.getElementById('mpPlan').value,amount:parseFloat(document.getElementById('mpAmt').value)||0,payment_ref:document.getElementById('mpRef').value,reason:reason,expires_days:+document.getElementById('mpDays').value||null})});
    toast(d.message||'Payment recorded','ok');
    ['mpUid','mpAmt','mpRef','mpReason','mpDays'].forEach(function(id){document.getElementById(id).value='';});
    loadSubs();
  }catch(e){toast(e.message,'err');}
}

async function loadReferrals(){
  document.getElementById('refList').innerHTML='<span class="spin"></span>';
  try{
    const d=await req('/api/admin/referrals');
    var mgdMap={};(d.managed||[]).forEach(function(m){mgdMap[m.code]=m;});
    var all=d.codes||[];
    if(!all.length){document.getElementById('refList').innerHTML='<div style="font-family:var(--fm);font-size:.52rem;color:var(--tx3);padding:.5rem">No referral codes found yet. Create one above.</div>';return;}
    document.getElementById('refList').innerHTML=all.map(function(r){
      var mgd=mgdMap[r.code]||{};
      var conv=r.total_users>0?Math.round(r.paid_users*100/r.total_users):0;
      var commOwed=mgd.commission_pct>0?(+r.total_revenue||0)*(mgd.commission_pct/100):0;
      return'<div class="refBox" onclick="loadRefDetail(\''+esc(r.code)+'\')"><div style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap"><span class="badge bO" style="font-size:.55rem;padding:.15rem .55rem">'+esc(r.code)+'</span>'+(mgd.owner_name?'<span style="font-family:var(--fm);font-size:.5rem;color:var(--tx2)">'+esc(mgd.owner_name)+'</span>':'')+(mgd.discount_pct>0?'<span class="badge bC">'+mgd.discount_pct+'% discount</span>':'')+(mgd.commission_pct>0?'<span class="badge bP">'+mgd.commission_pct+'% commission</span>':'')+'<span style="margin-left:auto;font-family:var(--fm);font-size:.45rem;color:var(--acc)">View detail</span></div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:.4rem;margin-top:.5rem"><div><div class="sLbl">Users</div><div style="font-family:var(--fd);font-size:1.1rem;color:var(--tx)">'+r.total_users+'</div></div><div><div class="sLbl">Paid</div><div style="font-family:var(--fd);font-size:1.1rem;color:var(--grn)">'+r.paid_users+'</div></div><div><div class="sLbl">Conv</div><div style="font-family:var(--fd);font-size:1.1rem;color:var(--acc)">'+conv+'%</div></div><div><div class="sLbl">Revenue</div><div style="font-family:var(--fd);font-size:1.1rem;color:var(--cyn)">'+(+r.total_revenue||0).toLocaleString('en-IN')+'</div></div><div><div class="sLbl">Last Used</div><div style="font-family:var(--fm);font-size:.47rem;color:var(--tx2);margin-top:.2rem">'+fds(r.last_used)+'</div></div></div>'+(commOwed>0?'<div style="font-family:var(--fm);font-size:.46rem;color:var(--pur);margin-top:.35rem">Commission owed: \u20b9'+commOwed.toLocaleString('en-IN')+' to '+esc(mgd.owner_name||'owner')+(mgd.owner_mobile?' | '+esc(mgd.owner_mobile):'')+'</div>':'')+'</div>';
    }).join('');
  }catch(e){document.getElementById('refList').innerHTML='<div style="color:var(--red);font-family:var(--fm);font-size:.52rem">Error: '+esc(e.message)+'</div>';}
}
async function loadRefDetail(code){
  var box=document.getElementById('refDetail');
  box.style.display='block';
  document.getElementById('refDetailTitle').textContent='Code: '+code;
  document.getElementById('refDetailBody').innerHTML='<span class="spin"></span>';
  try{
    const d=await req('/api/admin/referrals/'+encodeURIComponent(code));
    var s=d.stats||{};
    var totalPaid=(d.users||[]).reduce(function(a,u){return a+(+u.total_paid||0);},0);
    var cfgComm=d.config&&d.config.commission_pct||0;
    document.getElementById('refDetailBody').innerHTML=
      '<div class="sGrid" style="margin-bottom:.7rem">'
      +'<div class="sCard cOrg"><div class="sLbl">Total Users</div><div class="sVal cO">'+(s.total_users||0)+'</div></div>'
      +'<div class="sCard cGrn"><div class="sLbl">Paid</div><div class="sVal cG">'+(s.paid_users||0)+'</div></div>'
      +'<div class="sCard cCyn"><div class="sLbl">Free</div><div class="sVal cC">'+(s.free_users||0)+'</div></div>'
      +'<div class="sCard cOrg"><div class="sLbl">Conversion</div><div class="sVal cO">'+(s.conversion_rate||0)+'%</div></div>'
      +'</div>'
      +(d.config?'<div class="card" style="margin-bottom:.7rem"><div class="cHead">Configuration</div>'
        +dr('Owner',d.config.owner_name||'--')
        +dr('Contact',d.config.owner_mobile||'--')
        +dr('User Discount',d.config.discount_pct+'%')
        +dr('Commission',d.config.commission_pct+'%')
        +dr('Status',d.config.is_active?'<span class="badge bG">Active</span>':'<span class="badge bR">Inactive</span>')
        +(cfgComm>0?dr('Commission Owed','\u20b9'+(totalPaid*(cfgComm/100)).toLocaleString('en-IN')):'')
        +'</div>':'<div style="font-family:var(--fm);font-size:.5rem;color:var(--tx3);margin-bottom:.6rem">No config yet. Create one using the form above.</div>')
      +'<div class="tWrap"><table><thead><tr><th>User</th><th>Mobile</th><th>Plan</th><th>Joined</th><th>Last Login</th><th>Paid INR</th></tr></thead><tbody>'
      +(d.users||[]).map(function(u){return'<tr><td class="tName">'+esc(u.name)+'</td><td>'+esc(u.mobile)+'</td><td>'+pb(u.plan)+'</td><td class="tMute">'+fds(u.created_at)+'</td><td class="tMute">'+fdt(u.last_login_at)+'</td><td style="color:var(--grn)">'+(u.total_paid>0?'\u20b9'+Number(u.total_paid).toLocaleString('en-IN'):'--')+'</td></tr>';}).join('')+'</tbody></table></div>';
  }catch(e){document.getElementById('refDetailBody').innerHTML='<div style="color:var(--red);font-family:var(--fm);font-size:.52rem">Error: '+esc(e.message)+'</div>';}
}
async function saveRef(){
  var code=(document.getElementById('rcCode').value||'').trim().toUpperCase();
  if(!code){toast('Code is required','err');return;}
  try{
    await req('/api/admin/referrals',{method:'POST',body:JSON.stringify({code:code,owner_name:document.getElementById('rcName').value||null,owner_mobile:document.getElementById('rcMob').value||null,discount_pct:parseFloat(document.getElementById('rcDisc').value)||0,commission_pct:parseFloat(document.getElementById('rcComm').value)||0,notes:document.getElementById('rcNotes').value||null})});
    toast('Code '+code+' saved!','ok');
    ['rcCode','rcName','rcMob','rcDisc','rcComm','rcNotes'].forEach(function(id){document.getElementById(id).value='';});
    loadReferrals();
  }catch(e){toast(e.message,'err');}
}

function setAT(t){annType=t;['info','warning','critical'].forEach(function(x){var el=document.getElementById('tp-'+x);if(el)el.classList.toggle('tpActive',x===t);});}
async function postAnn(){
  var title=document.getElementById('aTitle').value.trim(),body=document.getElementById('aBody').value.trim();
  if(!title||!body){toast('Title and body required','err');return;}
  try{
    await req('/api/admin/announcements',{method:'POST',body:JSON.stringify({title:title,body:body,type:annType,target:document.getElementById('aTarget').value,expires_at:document.getElementById('aExp').value?new Date(document.getElementById('aExp').value).toISOString():null})});
    toast('Announcement posted!','ok');document.getElementById('aTitle').value='';document.getElementById('aBody').value='';document.getElementById('aExp').value='';loadAnns();
  }catch(e){toast(e.message,'err');}
}
async function loadAnns(){
  var list=document.getElementById('annList');list.innerHTML='<span class="spin"></span>';
  try{
    const d=await req('/api/admin/announcements');
    var tc={info:'bC',warning:'bY',critical:'bR'};
    list.innerHTML=(d.announcements||[]).map(function(a){return'<div style="background:var(--bg3);border:1px solid var(--bo);border-radius:8px;padding:.6rem .85rem;margin-bottom:.38rem;display:flex;align-items:flex-start;gap:.6rem"><span class="badge '+(tc[a.type]||'bX')+'">'+esc(a.type)+'</span><div style="flex:1;min-width:0"><div style="font-family:var(--fr);font-size:.88rem;font-weight:700;color:var(--tx)">'+esc(a.title)+'</div><div style="font-family:var(--fm);font-size:.47rem;color:var(--tx2);margin:.18rem 0">'+esc(a.body)+'</div><div style="font-family:var(--fm);font-size:.42rem;color:var(--tx3)">'+a.target+' - '+fds(a.created_at)+(a.expires_at?' - Exp: '+fds(a.expires_at):'')+'</div></div><div style="display:flex;flex-direction:column;gap:.28rem;align-items:flex-end;flex-shrink:0">'+(a.is_active?'<span class="badge bG">Active</span>':'<span class="badge bX">Inactive</span>')+'<button class="btn btnG btnSm" onclick="togAnn('+a.id+','+a.is_active+')">'+(a.is_active?'Deactivate':'Activate')+'</button></div></div>';}).join('')||'<div style="font-family:var(--fm);font-size:.52rem;color:var(--tx3)">No announcements</div>';
  }catch(e){list.innerHTML='<div style="color:var(--red);font-family:var(--fm);font-size:.52rem">Error: '+esc(e.message)+'</div>';}
}
async function togAnn(id,cur){try{await req('/api/admin/announcements/'+id,{method:'PATCH',body:JSON.stringify({is_active:!cur})});toast(cur?'Deactivated':'Activated','ok');loadAnns();}catch(e){toast(e.message,'err');}}

async function loadHealth(){
  try{
    const d=await req('/api/admin/health');
    var g=function(id){return document.getElementById(id);};
    var statusEl=g('h-status');statusEl.innerHTML=d.status==='healthy'?'<span style="color:var(--grn)">Healthy</span>':'<span style="color:var(--yel)">Degraded</span>';
    g('h-lat').textContent=d.checks&&d.checks.database&&d.checks.database.latency_ms||'--';
    g('h-up').textContent=Math.round((d.uptime_ms||0)/3600000)+'h';
    g('h-node').textContent=d.node_version||'--';
    var pool=d.checks&&d.checks.pool||{};
    g('h-pt').textContent=pool.total||0;g('h-pi').textContent=pool.idle||0;g('h-pw').textContent=pool.waiting||0;
    g('h-dbsz').textContent=d.checks&&d.checks.storage&&d.checks.storage.db_size||'--';
    document.getElementById('hTs').textContent='Updated: '+new Date().toLocaleTimeString('en-IN');
    var tc=d.checks&&d.checks.tables||{};
    g('h-tables').innerHTML=Object.entries(tc).map(function(e){return'<div class="dRow"><span class="dKey">'+e[0]+'</span><span class="dVal">'+Number(e[1]).toLocaleString('en-IN')+'</span></div>';}).join('');
    var mem=d.memory||{};var mb=function(b){return Math.round((b||0)/1024/1024);};
    g('h-memory').innerHTML=[['rss',mem.rss],['heapUsed',mem.heapUsed],['heapTotal',mem.heapTotal],['external',mem.external]].map(function(e){return'<div class="dRow"><span class="dKey">'+e[0]+'</span><span class="dVal">'+mb(e[1])+' MB</span></div>';}).join('');
    document.getElementById('dbDot').className='dot '+(d.status==='healthy'?'dotOn':'dotOff');
  }catch(e){toast('Health: '+e.message,'err');}
}

async function loadAudit(pg){
  pg=pg||1;audPage=pg;
  var tb=document.getElementById('audBody');
  tb.innerHTML='<tr class="tLoad"><td colspan="6"><span class="spin"></span></td></tr>';
  try{
    const d=await req('/api/admin/audit?page='+pg+'&limit=50');
    document.getElementById('aInfo').textContent='Page '+pg;
    document.getElementById('aPrev').disabled=pg<=1;
    document.getElementById('aNext').disabled=(d.logs||[]).length<50;
    var ac={ADMIN_LOGIN:'bG',TOGGLE_USER_STATUS:'bY',CHANGE_USER_PLAN:'bO',RESET_USER_MPIN:'bR',FORCE_LOGOUT:'bR',FLAG_USER:'bR',BULK_ACTION:'bC',MANUAL_PAYMENT:'bG',CREATE_REFERRAL_CODE:'bP',UPDATE_REFERRAL_CODE:'bP'};
    tb.innerHTML=(d.logs||[]).map(function(l){return'<tr><td class="tMute">'+fdt(l.created_at)+'</td><td class="tName">'+esc(l.admin_name||'--')+'</td><td><span class="badge '+(ac[l.action]||'bX')+'">'+esc(l.action)+'</span></td><td class="tMute">'+(l.target_name?esc(l.target_name)+' ('+esc(l.target_mobile||'')+'  )':'--')+'</td><td>'+(l.success!==false?'<span class="badge bG">OK</span>':'<span class="badge bR">Fail</span>')+'</td><td class="tMute">'+esc(l.ip_address||'--')+'</td></tr>';}).join('')||'<tr class="tLoad"><td colspan="6">No logs</td></tr>';
  }catch(e){tb.innerHTML='<tr class="tLoad"><td colspan="6">Error: '+esc(e.message)+'</td></tr>';toast(e.message,'err');}
}

function doExp(type,format){
  fetch('/api/admin/export/'+type+'?format='+format,{headers:{'Authorization':'Bearer '+tok}})
    .then(function(r){var cd=r.headers.get('content-disposition')||'';var fn=(cd.match(/filename="([^"]+)"/)&&cd.match(/filename="([^"]+")/ )[1])||type+'.'+format;return r.blob().then(function(blob){return{blob:blob,fn:fn};});})
    .then(function(x){var url=URL.createObjectURL(x.blob);var a=document.createElement('a');a.href=url;a.download=x.fn;document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(url);a.remove();},1000);toast('Download started','ok');})
    .catch(function(e){toast('Export failed: '+e.message,'err');});
}

async function openDr(uid){
  curId=uid;
  document.getElementById('dOvl').classList.add('open');document.getElementById('drawer').classList.add('open');
  document.getElementById('dName').textContent='Loading...';
  document.querySelectorAll('.dTab').forEach(function(t,i){t.classList.toggle('active',i===0);});
  document.querySelectorAll('.dPanel').forEach(function(p,i){p.classList.toggle('active',i===0);});
  document.getElementById('dp-profile').innerHTML='<span class="spin" style="display:block;margin:1.5rem auto"></span>';
  try{
    const d=await req('/api/admin/users/'+uid);var u=d.user;curNotes=u.notes||'';
    document.getElementById('dAva').textContent=(u.name||'?')[0].toUpperCase();
    document.getElementById('dName').textContent=u.name;
    document.getElementById('dSub2').innerHTML='ID:'+u.id+' &nbsp; '+pb(u.plan)+' &nbsp; '+sb(u.is_active);
    document.getElementById('dp-profile').innerHTML=
      '<div class="dSec">Identity</div>'+dr('Name',esc(u.name))+dr('Mobile',esc(u.mobile))+dr('Email',u.email?esc(u.email):'--')
      +dr('Referral Used',u.referral_code?'<span class="badge bP">'+esc(u.referral_code)+'</span>':'--')
      +dr('Angel Code',u.angel_client_code||'--')+dr('Experience',u.experience||'--')+dr('Trading Style',u.trading_style||'--')
      +'<div class="dSec">Account</div>'+dr('Plan',pb(u.plan))+dr('Status',sb(u.is_active))
      +dr('Flagged',u.flagged?'<span class="badge bR">Yes - '+esc(u.flag_reason||'')+'</span>':'<span class="badge bX">No</span>')
      +dr('Joined',fdt(u.created_at))
      +'<div class="dSec">Activity</div>'+dr('Total Logins',u.total_logins||0)+dr('Last Login',fdt(u.last_login_at))
      +dr('Last IP',u.last_login_ip||'--')+dr('Last Device',u.last_device||'--')+dr('Failed Logins',u.failed_logins||0)
      +'<div class="dSec">Admin Notes</div><div style="font-family:var(--fm);font-size:.51rem;color:var(--tx2);padding:.45rem;background:var(--bg3);border-radius:6px;min-height:32px;white-space:pre-wrap">'+esc(u.notes||'No notes')+'</div>';
    var devs=d.devices||[];
    document.getElementById('dp-devices').innerHTML=devs.length?devs.map(function(dv){return'<div class="row"><div class="dot '+(dv.is_trusted?'dotOn':'dotOff')+'"></div><div style="flex:1;min-width:0"><div style="font-family:var(--fm);font-size:.52rem;color:var(--tx)">'+esc(dv.device_name||'Unknown')+'</div><div class="tMute" style="font-size:.43rem">'+esc(dv.platform||'?')+' - '+esc(dv.ip_address||'--')+' - '+fdt(dv.last_seen_at)+'</div></div>'+(dv.is_trusted?'<span class="badge bG">Trusted</span>':'<span class="badge bX">Untrusted</span>')+'</div>';}).join(''):'<div style="font-family:var(--fm);font-size:.52rem;color:var(--tx3);padding:.5rem">No devices</div>';
    var hist=d.subHistory||[];
    document.getElementById('dp-history').innerHTML=hist.length?'<table style="width:100%;border-collapse:collapse;font-family:var(--fm);font-size:.49rem"><thead><tr style="border-bottom:1px solid var(--bo)"><th style="padding:.28rem;color:var(--tx3);text-align:left">Date</th><th>From</th><th>To</th><th style="text-align:left;padding:.28rem">Reason</th><th style="text-align:right;padding:.28rem">INR</th></tr></thead><tbody>'+hist.map(function(h){return'<tr style="border-bottom:1px solid rgba(255,255,255,.04)"><td style="padding:.28rem;color:var(--tx3)">'+fds(h.created_at)+'</td><td style="padding:.28rem">'+pb(h.plan_from)+'</td><td style="padding:.28rem">'+pb(h.plan_to)+'</td><td style="padding:.28rem;color:var(--tx2)">'+esc(h.reason||'--')+'</td><td style="padding:.28rem;text-align:right;color:var(--acc)">'+(h.amount?'\u20b9'+Number(h.amount).toLocaleString('en-IN'):'--')+'</td></tr>';}).join('')+'</tbody></table>':'<div style="font-family:var(--fm);font-size:.52rem;color:var(--tx3);padding:.5rem">No history</div>';
    document.getElementById('dp-actions').innerHTML='<div class="dSec">Quick Actions</div><div class="actGrid"><button class="btn btnG" onclick="actStatus('+u.id+','+u.is_active+')">'+(u.is_active?'Deactivate':'Activate')+'</button><button class="btn btnG" onclick="openPlanMod('+u.id+',\''+u.plan+'\')">Change Plan</button><button class="btn btnG" onclick="openMpinMod('+u.id+')">Reset MPIN</button><button class="btn btnG" onclick="actForceLogout('+u.id+')">Force Logout</button><button class="btn btnG" onclick="openNotesMod('+u.id+')">Edit Notes</button><button class="btn '+(u.flagged?'btnS':'btnD')+'" onclick="actFlag('+u.id+','+u.flagged+')">'+(u.flagged?'Remove Flag':'Flag User')+'</button></div>';
  }catch(e){document.getElementById('dp-profile').innerHTML='<div style="padding:1rem;color:var(--red);font-family:var(--fm);font-size:.52rem">Error: '+esc(e.message)+'</div>';toast(e.message,'err');}
}
function dr(k,v){return'<div class="dRow"><span class="dKey">'+k+'</span><span class="dVal">'+v+'</span></div>';}
function closeDr(){document.getElementById('dOvl').classList.remove('open');document.getElementById('drawer').classList.remove('open');curId=null;}
function swTab(name,el){document.querySelectorAll('.dTab').forEach(function(t){t.classList.remove('active');});document.querySelectorAll('.dPanel').forEach(function(p){p.classList.remove('active');});el.classList.add('active');document.getElementById('dp-'+name).classList.add('active');}
async function actStatus(uid,cur){try{const d=await req('/api/admin/users/'+uid+'/status',{method:'PATCH',body:JSON.stringify({is_active:!cur})});toast(d.message||'Done','ok');closeDr();loadUsers(uPage);}catch(e){toast(e.message,'err');}}
function openPlanMod(uid,plan){curId=uid;document.getElementById('mPlan').value=plan||'FREE';document.getElementById('mReason').value='';document.getElementById('mAmt').value=0;document.getElementById('mRef').value='';document.getElementById('planMod').classList.add('open');}
async function submitPlan(){try{const d=await req('/api/admin/users/'+curId+'/plan',{method:'PATCH',body:JSON.stringify({plan:document.getElementById('mPlan').value,reason:document.getElementById('mReason').value,amount:parseFloat(document.getElementById('mAmt').value)||0,payment_ref:document.getElementById('mRef').value||null})});toast(d.message||'Done','ok');closeMod('planMod');closeDr();loadUsers(uPage);}catch(e){toast(e.message,'err');}}
function openMpinMod(uid){curId=uid;document.getElementById('mMpin').value='';document.getElementById('mpinMod').classList.add('open');}
async function submitMpin(){try{const d=await req('/api/admin/users/'+curId+'/reset-mpin',{method:'POST',body:JSON.stringify({new_mpin:document.getElementById('mMpin').value})});toast(d.message||'Done','ok');closeMod('mpinMod');}catch(e){toast(e.message,'err');}}
async function actForceLogout(uid){try{const d=await req('/api/admin/users/'+uid+'/force-logout',{method:'POST',body:'{}'});toast(d.message||'Done','ok');}catch(e){toast(e.message,'err');}}
function openNotesMod(uid){curId=uid;document.getElementById('mNotes').value=curNotes;document.getElementById('notesMod').classList.add('open');}
async function submitNotes(){try{await req('/api/admin/users/'+curId+'/notes',{method:'PATCH',body:JSON.stringify({notes:document.getElementById('mNotes').value})});toast('Notes saved','ok');closeMod('notesMod');openDr(curId);}catch(e){toast(e.message,'err');}}
async function actFlag(uid,cur){var reason=cur?'':(prompt('Flag reason:')||'');try{await req('/api/admin/users/'+uid+'/flag',{method:'PATCH',body:JSON.stringify({flagged:!cur,flag_reason:reason})});toast(cur?'Flag removed':'Flagged','ok');openDr(uid);loadUsers(uPage);}catch(e){toast(e.message,'err');}}

document.addEventListener('DOMContentLoaded',function(){
  var mob=document.getElementById('lMob'),pin=document.getElementById('lPin');
  if(mob)mob.addEventListener('keydown',function(e){if(e.key==='Enter'&&pin)pin.focus();});
  if(pin)pin.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

if(tok){document.getElementById('loginScreen').style.display='none';document.getElementById('app').style.display='block';initApp();}
